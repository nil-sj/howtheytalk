# TalkNotes - Drupal services.yml
# Place at: drupal/settings/services.yml
# Controls CORS (for React frontend) and other service settings.

parameters:

  # ── CORS (allows React frontend to call Drupal JSON:API) ──────────────────
  cors.config:
    enabled: true
    # Only GET and OPTIONS — never allow unauthenticated writes
    allowedMethods: ['GET', 'OPTIONS']
    allowedHeaders:
      - 'Content-Type'
      - 'Accept'
      - 'Authorization'
    allowedOrigins:
      - 'http://localhost:3000'     # React dev server
      - 'http://localhost:5173'     # Vite dev server
      # Add your production domain below when deploying:
      # - 'https://talknotes.yourdomain.com'
    exposedHeaders: false
    maxAge: 1000
    supportsCredentials: false

  # ── Twig (template engine) ─────────────────────────────────────────────────
  twig.config:
    # Set to true in development to see template suggestions
    debug: false
    auto_reload: false
    cache: true
