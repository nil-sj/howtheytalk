id: talknotes_workflow
label: 'TalkNotes Workflow'
type: content_moderation
type_settings:
  states:
    archived:
      label: Archived
      weight: 2
      published: false
      default_revision: false
    draft:
      label: Draft
      weight: 0
      published: false
      default_revision: false
    published:
      label: Published
      weight: 1
      published: true
      default_revision: true
  transitions:
    create_new_draft:
      label: 'Save as draft'
      from:
        - draft
        - archived
      to: draft
      weight: 0
    publish:
      label: Publish
      from:
        - draft
      to: published
      weight: 1
    restore:
      label: 'Restore to draft'
      from:
        - archived
      to: draft
      weight: 3
    unpublish:
      label: Unpublish
      from:
        - published
      to: archived
      weight: 2
  entity_types:
    node:
      - language_entry
      - usage_difference
      - article
